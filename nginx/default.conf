server {
    listen 80;
    server_name winnicode.test;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name winnicode.test;

    ssl_certificate /etc/nginx/ssl/winnicode.test.pem;
    ssl_certificate_key /etc/nginx/ssl/winnicode.test-key.pem;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 128M;

    # Next.js internal assets
    location ^~ /_next/ {
        proxy_pass http://winnicode_next:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }

    # Laravel / Filament public assets
    location ^~ /build/ {
        try_files $uri $uri/ =404;
    }

    location ^~ /css/ {
        try_files $uri $uri/ =404;
    }

    location ^~ /js/ {
        try_files $uri $uri/ =404;
    }

    location ^~ /vendor/ {
        try_files $uri $uri/ =404;
    }

    location ^~ /fonts/ {
        try_files $uri $uri/ =404;
    }

    location ^~ /images/ {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico {
        try_files $uri =404;
    }

    # Laravel API
    location ^~ /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel Sanctum
    location ^~ /sanctum/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel storage
    location ^~ /storage/ {
        try_files $uri $uri/ =404;
    }

    # Laravel Livewire
    location ^~ /livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel Filament admin
    location ^~ /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM Laravel
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass winnicode:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Next.js frontend utama
    location / {
        proxy_pass http://winnicode_next:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }
}