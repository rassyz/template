services:
  winnicode:
    build: ./php
    image: winnicode_php:latest
    container_name: winnicode
    hostname: "winnicode"
    env_file:
      - ./.env.docker
    volumes:
      - ./backend:/var/www/html
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    working_dir: /var/www/html
    depends_on:
      winnicode_db:
        condition: service_healthy

  winnicode_next:
    build:
      context: ./next
      dockerfile: Dockerfile
    image: winnicode_next:latest
    container_name: winnicode_next
    hostname: "winnicode_next"
    working_dir: /app
    environment:
      AUTO_CREATE_NEXT: "true"
      NEXT_PROJECT_NAME: "winnicode-next-frontend"
      NEXT_PUBLIC_API_URL: "https://winnicode.test/api"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - winnicode_next_node_modules:/app/node_modules
      - winnicode_next_cache:/app/.next
    expose:
      - "3000"
    depends_on:
      winnicode:
        condition: service_started

  winnicode_db:
    image: mariadb:10.11
    container_name: winnicode_db
    restart: unless-stopped
    tty: true
    ports:
      - "13306:3306"
    env_file:
      - ./.env.docker
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/conf.d:/etc/mysql/conf.d:ro
    environment:
      SERVICE_TAGS: dev
      SERVICE_NAME: winnicode_db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  winnicode_nginx:
    build: ./nginx
    image: winnicode_nginx:latest
    container_name: winnicode_nginx
    hostname: "winnicode_nginx"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      winnicode:
        condition: service_started
      winnicode_next:
        condition: service_started

volumes:
  winnicode_next_node_modules:
  winnicode_next_cache:
