services:
  winnicode:
    build: ./php
    image: winnicode_php:latest
    container_name: winnicode
    hostname: "winnicode"
    env_file:
      - ./.env.docker
    volumes:
      - ./src:/var/www/html
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    working_dir: /var/www/html
    depends_on:
      winnicode_db:
        condition: service_healthy

  winnicode_db:
    image: mariadb:10.11
    container_name: winnicode_db
    restart: unless-stopped
    tty: true
    ports:
      - "13306:3306"
    env_file:
      - ./.env.docker
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/conf.d:/etc/mysql/conf.d:ro
    environment:
      SERVICE_TAGS: dev
      SERVICE_NAME: winnicode_db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  winnicode_nginx:
    build: ./nginx
    image: winnicode_nginx:latest
    container_name: winnicode_nginx
    hostname: "winnicode_nginx"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      winnicode:
        condition: service_started
